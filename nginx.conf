server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;

        # --- Security headers ---

        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer policy — send origin on cross-origin, full on same-origin
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HSTS — force HTTPS for 1 year (enable only behind TLS termination)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CSP — restrict script/style sources to self; block inline scripts
        # Adjust 'unsafe-inline' for styles if TailwindCSS injects <style> tags
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.ieltsweb.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Permissions-Policy — deny access to sensitive browser APIs
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # X-XSS-Protection is obsolete in modern browsers and removed intentionally.
        # CSP provides the real protection.
    }
}
